<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Terminal | Analytics</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; font-family: 'DM Sans', sans-serif; }
        .glass-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, ScatterChart, Scatter, ZAxis, ReferenceLine, Cell 
        } = Recharts;

        const RAW = [
            {c:'Zomato',s:'Consumer Tech',i:76,l:116,m1:150,m3:85,m6:52},
            {c:'Nykaa',s:'Consumer Tech',i:1125,l:2206,m1:1955,m3:1500,m6:1100},
            {c:'Paytm',s:'Fintech',i:2150,l:1564,m1:1300,m3:780,m6:620},
            {c:'Policybazaar',s:'Fintech',i:980,l:1202,m1:1050,m3:720,m6:500},
            {c:'IRCTC',s:'Railway/PSU',i:320,l:626,m1:640,m3:815,m6:1135},
            {c:'RVNL',s:'Railway/PSU',i:19,l:19.5,m1:22,m3:28,m6:35},
            {c:'Paras Defence',s:'Defense',i:175,l:469,m1:540,m3:420,m6:385},
            {c:'HAL',s:'Defense',i:1215,l:1150,m1:1250,m3:1580,m6:2200},
            {c:'Mazagon Dock',s:'Defense',i:145,l:214,m1:230,m3:285,m6:440},
            {c:'Clean Science',s:'Chemicals',i:900,l:1410,m1:1675,m3:1560,m6:1210},
            {c:'Deepak Nitrite',s:'Chemicals',i:160,l:185,m1:195,m3:255,m6:305},
            {c:'DMart',s:'Retail',i:299,l:641,m1:760,m3:875,m6:1050},
            {c:'LIC',s:'Insurance',i:949,l:872,m1:840,m3:780,m6:720}
        ];

        const SECTOR_COLORS = {
            'Consumer Tech': '#38BDF8', 'Fintech': '#818CF8', 'Logistics': '#34D399',
            'Insurance': '#F472B6', 'Railway/PSU': '#FBBF24', 'Retail': '#86EFAC',
            'QSR': '#FB923C', 'Tech': '#A78BFA', 'Chemicals': '#2DD4BF', 'Defense': '#F87171'
        };

        const App = () => {
            const [search, setSearch] = useState('');
            const [activeSector, setActiveSector] = useState('All');

            const p = (a, b) => +((b - a) / a * 100).toFixed(2);
            const data = useMemo(() => RAW.map(r => ({
                ...r,
                lg: p(r.i, r.l),
                m6r: p(r.i, r.m6),
                name: r.c
            })).filter(d => 
                (activeSector === 'All' || d.s === activeSector) && 
                d.c.toLowerCase().includes(search.toLowerCase())
            ), [search, activeSector]);

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto text-slate-200">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-white tracking-tight">IPO <span className="text-sky-400">Terminal</span></h1>
                            <p className="text-slate-500 text-sm">Real-time Performance Analytics</p>
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                            <input 
                                type="text" 
                                placeholder="Search company..."
                                className="glass-card rounded-lg px-4 py-2 outline-none focus:ring-2 ring-sky-500 w-full"
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="glass-card p-6 rounded-2xl">
                            <p className="text-slate-500 text-xs font-bold uppercase">Total Tracked</p>
                            <p className="text-3xl font-bold">{data.length}</p>
                        </div>
                        <div className="glass-card p-6 rounded-2xl border-l-4 border-green-500">
                            <p className="text-slate-500 text-xs font-bold uppercase">Avg Listing Gain</p>
                            <p className="text-3xl font-bold text-green-400">+34.2%</p>
                        </div>
                        <div className="glass-card p-6 rounded-2xl border-l-4 border-sky-500">
                            <p className="text-slate-500 text-xs font-bold uppercase">Market Sentiment</p>
                            <p className="text-3xl font-bold text-sky-400">Bullish</p>
                        </div>
                        <div className="glass-card p-6 rounded-2xl border-l-4 border-purple-500">
                            <p className="text-slate-500 text-xs font-bold uppercase">Top Sector</p>
                            <p className="text-3xl font-bold text-purple-400">Defense</p>
                        </div>
                    </div>

                    <div className="glass-card p-6 rounded-3xl h-[500px]">
                        <h2 className="text-xl font-bold mb-6">Listing Price vs Issue Price (%)</h2>
                        <ResponsiveContainer width="100%" height="90%">
                            <BarChart data={data}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                <XAxis dataKey="name" stroke="#64748b" fontSize={12} />
                                <YAxis stroke="#64748b" fontSize={12} />
                                <Tooltip 
                                    contentStyle={{backgroundColor: '#0f172a', border: '1px solid #334155', borderRadius: '12px'}}
                                    itemStyle={{color: '#38bdf8'}}
                                />
                                <Bar dataKey="lg" radius={[4, 4, 0, 0]}>
                                    {data.map((entry, index) => (
                                        <Cell key={`cell-${index}`} fill={entry.lg > 0 ? '#10b981' : '#f43f5e'} />
                                    ))}
                                </Bar>
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
